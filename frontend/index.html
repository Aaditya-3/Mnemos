<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat with Memory</title>
    <!-- Tailwind CSS (CDN ok for dev; for production use PostCSS/CLI: https://tailwindcss.com/docs/installation) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel Standalone for JSX (dev only; for production precompile: https://babeljs.io/docs/setup/) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        (function () {
            try {
                var theme = localStorage.getItem("mnemos_theme");
                if (theme === "dark" || theme === "light") {
                    document.documentElement.setAttribute("data-theme", theme);
                }
            } catch (e) {}
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --base-1-rgb: 34 40 49;     /* #222831 */
            --base-2-rgb: 57 62 70;     /* #393E46 */
            --base-3-rgb: 148 137 121;  /* #948979 */
            --base-4-rgb: 223 208 184;  /* #DFD0B8 */
        }

        :root[data-theme="dark"], :root:not([data-theme]) {
            color-scheme: dark;
            --bg-rgb: var(--base-1-rgb);
            --bg-alt-rgb: 41 48 58;
            --panel-rgb: var(--base-2-rgb);
            --panel-2-rgb: 49 54 62;
            --panel-deep-rgb: 38 44 53;
            --accent-rgb: var(--base-3-rgb);
            --accent-soft-rgb: var(--base-4-rgb);
            --text-rgb: var(--base-4-rgb);
            --text-muted-rgb: 184 171 150;
            --on-accent-rgb: var(--base-1-rgb);
            --border-rgb: var(--base-3-rgb);
            --glow-a-rgb: var(--base-3-rgb);
            --glow-b-rgb: var(--base-4-rgb);
            --overlay-rgb: 16 21 29;
            --surface-border-rgb: var(--base-3-rgb);
            --shadow-rgb: var(--overlay-rgb);
        }

        :root[data-theme="light"] {
            color-scheme: light;
            --bg-rgb: var(--base-4-rgb);
            --bg-alt-rgb: 239 227 206;
            --panel-rgb: 248 239 225;
            --panel-2-rgb: 232 215 188;
            --panel-deep-rgb: 216 197 168;
            --accent-rgb: var(--base-3-rgb);
            --accent-soft-rgb: var(--base-2-rgb);
            --text-rgb: var(--base-1-rgb);
            --text-muted-rgb: var(--base-2-rgb);
            --on-accent-rgb: var(--base-1-rgb);
            --border-rgb: var(--base-2-rgb);
            --glow-a-rgb: var(--base-2-rgb);
            --glow-b-rgb: var(--base-3-rgb);
            --overlay-rgb: var(--base-1-rgb);
            --surface-border-rgb: var(--base-2-rgb);
            --shadow-rgb: var(--base-1-rgb);
        }

        html, body {
            scroll-behavior: smooth;
            background:
                linear-gradient(145deg, rgb(var(--bg-rgb)) 0%, rgb(var(--bg-alt-rgb)) 100%),
                radial-gradient(circle at 8% 8%, rgb(var(--glow-b-rgb) / 0.16), transparent 42%),
                radial-gradient(circle at 92% 12%, rgb(var(--glow-a-rgb) / 0.16), transparent 40%),
                rgb(var(--bg-rgb));
            color: rgb(var(--text-rgb));
            font-family: "Manrope", sans-serif;
            transition: background 320ms ease, color 240ms ease;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: linear-gradient(
                to bottom,
                rgb(var(--surface-border-rgb) / 0.06) 1px,
                transparent 1px
            );
            background-size: 100% 26px;
            mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 82%, transparent 100%);
            opacity: 0.45;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes softPop {
            from {
                opacity: 0;
                transform: scale(0.98) translateY(4px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .fade-up {
            animation: fadeUp 200ms ease-out;
        }

        .fade-in {
            animation: fadeIn 150ms ease-out;
        }

        .soft-pop {
            animation: softPop 180ms ease-out;
        }

        @keyframes typingDotBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.45;
            }
            30% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }

        .typing-dots {
            display: inline-flex;
            align-items: flex-end;
            gap: 6px;
            height: 12px;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            border-radius: 9999px;
            background: rgb(var(--text-rgb));
            animation: typingDotBounce 0.9s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.12s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.24s;
        }

        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgb(var(--panel-rgb) / 0.58);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgb(var(--accent-rgb));
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgb(var(--accent-soft-rgb));
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="app.jsx?v=20260311b"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat with Memory</title>
    <!-- Tailwind CSS (CDN ok for dev; for production use PostCSS/CLI: https://tailwindcss.com/docs/installation) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel Standalone for JSX (dev only; for production precompile: https://babeljs.io/docs/setup/) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        (function () {
            try {
                var theme = localStorage.getItem("mnemos_theme");
                if (theme === "dark" || theme === "light") {
                    document.documentElement.setAttribute("data-theme", theme);
                }
            } catch (e) {}
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --base-1-rgb: 17 17 17;     /* #111111 */
            --base-2-rgb: 31 31 31;     /* #1F1F1F */
            --base-3-rgb: 141 129 112;  /* #8D8170 */
            --base-4-rgb: 237 232 224;  /* #EDE8E0 */
        }

        :root[data-theme="dark"], :root:not([data-theme]) {
            color-scheme: dark;
            --bg-rgb: var(--base-1-rgb);
            --bg-alt-rgb: 25 25 25;
            --panel-rgb: var(--base-2-rgb);
            --panel-2-rgb: 43 43 43;
            --panel-deep-rgb: 23 23 23;
            --accent-rgb: var(--base-3-rgb);
            --accent-soft-rgb: 191 176 154;
            --text-rgb: var(--base-4-rgb);
            --text-muted-rgb: 171 162 148;
            --on-accent-rgb: 24 22 20;
            --border-rgb: 124 113 97;
            --glow-a-rgb: var(--base-3-rgb);
            --glow-b-rgb: 175 163 145;
            --overlay-rgb: 8 8 8;
            --surface-border-rgb: 127 116 100;
            --shadow-rgb: var(--overlay-rgb);
        }

        :root[data-theme="light"] {
            color-scheme: light;
            --bg-rgb: 250 247 242;
            --bg-alt-rgb: 242 236 227;
            --panel-rgb: 255 252 248;
            --panel-2-rgb: 247 241 232;
            --panel-deep-rgb: 236 228 217;
            --accent-rgb: 117 102 84;
            --accent-soft-rgb: 152 136 117;
            --text-rgb: 35 32 28;
            --text-muted-rgb: 104 95 83;
            --on-accent-rgb: 252 249 244;
            --border-rgb: 169 155 136;
            --glow-a-rgb: 188 174 155;
            --glow-b-rgb: 226 214 198;
            --overlay-rgb: 25 20 16;
            --surface-border-rgb: 171 157 138;
            --shadow-rgb: var(--overlay-rgb);
        }

        html, body {
            scroll-behavior: smooth;
            background:
                linear-gradient(145deg, rgb(var(--bg-rgb)) 0%, rgb(var(--bg-alt-rgb)) 100%),
                radial-gradient(circle at 8% 8%, rgb(var(--glow-b-rgb) / 0.16), transparent 42%),
                radial-gradient(circle at 92% 12%, rgb(var(--glow-a-rgb) / 0.16), transparent 40%),
                rgb(var(--bg-rgb));
            color: rgb(var(--text-rgb));
            font-family: "Manrope", sans-serif;
            transition: background 320ms ease, color 240ms ease;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: linear-gradient(
                to bottom,
                rgb(var(--surface-border-rgb) / 0.06) 1px,
                transparent 1px
            );
            background-size: 100% 26px;
            mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 82%, transparent 100%);
            opacity: 0.45;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes softPop {
            from {
                opacity: 0;
                transform: scale(0.98) translateY(4px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .fade-up {
            animation: fadeUp 200ms ease-out;
        }

        .fade-in {
            animation: fadeIn 150ms ease-out;
        }

        .soft-pop {
            animation: softPop 180ms ease-out;
        }

        @keyframes typingDotBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.45;
            }
            30% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }

        .typing-dots {
            display: inline-flex;
            align-items: flex-end;
            gap: 6px;
            height: 12px;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            border-radius: 9999px;
            background: rgb(var(--text-rgb));
            animation: typingDotBounce 0.9s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.12s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.24s;
        }

        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgb(var(--panel-rgb) / 0.58);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgb(var(--accent-rgb));
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgb(var(--accent-soft-rgb));
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="app.jsx?v=20260311b"></script>
</body>
</html>
